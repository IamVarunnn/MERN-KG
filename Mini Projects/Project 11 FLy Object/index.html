<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js" ></script>

    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .banner{
            width: 100%;
            height: 100vh;
            position: absolute;
            background-image: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url(images/pic.jpeg);
 
            background-position: center;
            background-size: cover;
        }

        .drone_box{
            margin: 150px auto;
            
            width: 200px;
            position: relative;
        }

        .drone_pic{
            width: 100%;
        }

        .drone_left_pic{
            width: 80px;
            top: 0;
            left: -11px;
            position: absolute;
            animation : rotation .2s linear infinite;
        }

        .drone_right_pic{
            width: 80px;
            top: 0;
            right: -12px;
            position: absolute;
            animation : rotation .2s linear infinite;
        }

        @keyframes rotation {
            100%{
                transform: rotateY(360deg);
            }
        } 
       
    </style>

</head>
<body>
    
    <div class="banner">
        
        <div class="drone_box">
            <img class="drone_pic" src="images/drone.png" alt="">
            <img class="drone_left_pic" src="images/drone-left.png" alt="">
            <img class="drone_right_pic" src="images/drone-right.png" alt="">
        </div>

    </div>
    


</body>
<script>
$(document).ready(function () {
    $(".banner").mousemove(function (e) {
        var moveX = (e.pageX * -1 / 20) + 30;
        var moveY = (e.pageY * -1 / 20) + 12;

        $(".drone_box").css({
            "transform": "translate3d(" + moveX + "px, " + moveY + "px, 0)"
        });
    });
});
</script>

</html>
