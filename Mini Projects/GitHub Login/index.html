<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to GitHub - GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="signup_page">

        <div class="logo">
            <i class="fa-brands fa-github"></i>
            <h3>Sign in to GitHub</h3>
        </div>

        <form class="sign_form" action="">

            <div class="username_div">

                <label for="username">Username or email address</label>
                <input type="text" id="username">

            </div>
            <div class="pass_div">
                
                <div class="pass_div_text"><label for="Password">Password</label><span class="color" >Forgot password?</span></div>
                <input type="password" id="Password">
                
            </div>

            <button class="button_sign" >Sign in</button>

            <div class="line">
                <div class="left_line"></div>
                <span class="or">or</span>
                <div class="right_line"></div>
            </div> 

        </form>



        <div class="socials">

            <button><img src="images/google.png" alt="">Continue with Google</button>
            <button><img src="images/apple.png" alt="">Continue with Apple</button>

        </div>

        <div class="create_account">
            <p>New to GitHub?<span class="color" >Create an account</span></p>
            <p class="color" >Sign in with a passkey</p>
        </div>



    </div>
 

    <footer>

         
        <div class="footer_links">
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
            <a href="#">Docs</a>
            <a href="#">Contact GitHub Support</a>
            <a href="#">Manage cookies</a>
            <a href="#">Do not share my personal information</a>
        </div>
             
        
    </footer>

</body>
<script src="https://kit.fontawesome.com/b6c318c10e.js" crossorigin="anonymous"></script>
</html>
