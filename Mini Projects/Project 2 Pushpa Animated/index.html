<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pushpa - THE RISE</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>


        *{
            margin: 0;
            padding: 0;
        }

       
        .container{
            display: flex;
            justify-content: center;

        }

        .bg_image{
            height: 98vh;
            width: 30vw;
            margin: 10px;
            background-image: url(images/image.png);
            background-size: cover;
            background-position: center;
            overflow: hidden;

            display: flex;
            flex-direction: column;
            
        }

        .aa_img{
            min-width: 100%;
            opacity: 0;
            transform: translateY(50px);
        }

        .aa img{
            animation-delay: 1s;
        }

        .anim-move{
            animation: moveup 0.5s linear forwards;
        }

        .title{
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
            justify-content: center;
            /* left: 150px; */
            bottom: 800px;
            margin-bottom: 10px;

        }

        
        .title span{
            font-family: 'Anton', sans-serif;
            font-size: 48px;
            color: #ff7a00; /* fiery orange */
            text-shadow: 
                2px 2px 0 #000,
                0 0 10px rgba(255, 120, 0, 0.8);
            letter-spacing: 4px;
            opacity: 0;
        }
        

        .title span:nth-child(1) { animation-delay: 1.0s; }
        .title span:nth-child(2) { animation-delay: 1.2s; }
        .title span:nth-child(3) { animation-delay: 1.4s; }
        .title span:nth-child(4) { animation-delay: 1.6s; }
        .title span:nth-child(5) { animation-delay: 1.8s; }
        .title span:nth-child(6) { animation-delay: 2.0s; }
        

        .title-2{
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
            justify-content: center;
            /* left: 150px; */
            bottom: 800px;
             margin-bottom: 10px;

        }

        .title-2 span{
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: #ffd166; /* warm gold */
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 3px;
            opacity: 0;
        }

        .title-2 span:nth-child(1) { animation-delay: 2.1s; }
        .title-2 span:nth-child(2) { animation-delay: 2.3s; }
        .title-2 span:nth-child(3) { animation-delay: 2.5s; }
        .title-2 span:nth-child(4) { animation-delay: 2.7s; }
        .title-2 span:nth-child(5) { animation-delay: 2.9s; }
        .title-2 span:nth-child(6) { animation-delay: 3.1s; }
        .title-2 span:nth-child(7) { animation-delay: 3.3s; }
        .title-2 span:nth-child(8) { animation-delay: 3.5s; }

        .title-3{
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
            justify-content: center;
            /* left: 150px; */
            bottom: 800px;
             margin-bottom: 10px;

        }

        .title-3 span{
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            letter-spacing: 2px;
            opacity: 0;
        }

        .title-3 span:nth-child(1) { animation-delay: 3.7s; }
        .title-3 span:nth-child(2) { animation-delay: 3.8s; }
        .title-3 span:nth-child(3) { animation-delay: 3.9s; }
        .title-3 span:nth-child(4) { animation-delay: 4.1s; }
        .title-3 span:nth-child(5) { animation-delay: 4.2s; }
        .title-3 span:nth-child(6) { animation-delay: 4.3s; }
        .title-3 span:nth-child(7) { animation-delay: 4.5s; }
        

        @keyframes moveup {
            100%{
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>

</head>
<body>
    

    <div class="container">

        <div class="bg_image">

            <div class="aa"><img src="images/puhspa.png" class="aa_img anim-move" alt=""></div>
            <div class="title">
                <span class="anim-move">P</span>
                <span class="anim-move">U</span>
                <span class="anim-move">S</span>
                <span class="anim-move">H</span>
                <span class="anim-move">P</span>
                <span class="anim-move">A</span>
            </div>

            <div class="title-2">
                <span class="anim-move">T</span>
                <span class="anim-move">H</span>
                <span class="anim-move">E</span>
                <span class="anim-move">-</span>
                <span class="anim-move">R</span>
                <span class="anim-move">I</span>
                <span class="anim-move">S</span>
                <span class="anim-move">E</span>
            </div>

            <div class="title-3">
                <span class="anim-move">P</span>
                <span class="anim-move">A</span>
                <span class="anim-move">R</span>
                <span class="anim-move">T</span>
                <span class="anim-move">-</span>
                <span class="anim-move">0</span>
                <span class="anim-move">1</span>
                <!-- <span class="anim-move">E</span> -->
            </div>
        </div>

           


    </div>

</body>
</html>
