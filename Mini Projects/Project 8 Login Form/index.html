
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>

        *{
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .container{
            height: 100vh;
            width: 100%;
            background-color: rgb(6, 190, 162);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login_form_card{
            min-height: 450px;
            min-width: 400px;
            background-color: white;
            border-radius: 10px;

        }

        .title{
            height: 80px;
            background-color: rgb(39, 143, 133);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;

        }

        form{
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
            padding: 40px 20px 20px 20px;
            gap: 20px;
        }

        .email,.password,.login{
            border-radius: 5px;
            border: 1px solid rgb(129, 132, 129);
        }
        

        .email,.password,.login{
            width: 300px;
            /* background-color: orange; */
            display: flex;
            justify-content: center;
            align-items: center;
           
              
        }

        .user_icon,.password_icon{
             background-color: rgb(39, 143, 133);
             border-top-left-radius: 4px;
             border-bottom-left-radius: 4px;
        }

        .user_icon i{
            /* height: 40px; */
            font-size: 30px;
            display: flex;
            padding: 10px;
            color: white;
            
            
        }

        .password_icon i{
            /* height: 40px; */
            font-size: 30px;
            display: flex;
            padding: 10px;
              color: white;
            
             
            
        }

        .user_input,.password_input{
            background-color: white;
            /* width: 300px; */
            width: 100%;
            border-top-right-radius: 5px;
             border-bottom-right-radius: 5px;
           

        }

        .user_input input{
            width: 95%;
            height: 100%;
            padding: 13px 0px 13px 13px;
            font-size: 20px;
            border: none;
            outline: none;
             border-top-right-radius: 5px;
             border-bottom-right-radius: 5px;
            
        }

        .forgot_password{
            position: relative;
            top: -9px;
            /* bottom: 8px; */
            right: 80px;
            font-size: 20px;
            color: rgb(39, 143, 133);
        }

        .login_input{
            width: 100%;
            padding: 10px;
            font-size: 20px;
            color: white;
            /* background-color: rgb(6, 190, 162); */
            background-color: rgb(39, 143, 133);
            border: none;
            border-radius: 2px;
            border-radius: 4px;
        }

         

        

         

        
        
        

         
    </style>

</head>
<body>
    
    <div class="container">

        <div class="login_form_card">

            <div class="title">Login Form</div>
            <form action="#">

                <div class="email">
                    <div class="user_icon"><i class="fas fa-user" ></i></div>
                    <div class="user_input"><input type="text" placeholder="Email or Phone"></div>
                </div>
                <div class="password">
                    <div class="password_icon"><i class="fas fa-lock" ></i></div>
                    <div class="user_input"><input type="password" placeholder="Passowrd"></div>
                </div>

                <div class="forgot_password">
                    <span>Forgot Password</span>
                </div>
                <div class="login">
                    <input class="login_input" type="submit" value="Login">
                </div>

                <span>Not a member? <span style="color: rgb(39, 143, 133);" >Signup now</span></span>

            </form>

        </div>

    </div>

</body>
<script src="https://kit.fontawesome.com/b6c318c10e.js" crossorigin="anonymous"></script>
</html>
