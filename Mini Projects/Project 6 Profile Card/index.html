<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">

    

</head>
<body>
    

    <div class="container">

        <div class="card">

            <div class="top_card">
                <div class="profile_image">
                    <img class="profile_image_img" src="images/image.png" alt="">
                </div>
            </div>
            <div class="bottom_card">
                <div class="bottom_card_text">
                    <span>Coding</span>
                    <p>Youtuber & Blogger</p>
                </div>
                <div class="bottom_card_socials">
                    <div class="facebook"><i class="fa-brands fa-facebook-f"></i></div>
                    <div class="twitter"><i class="fa-brands fa-twitter"></i></div>
                    <div class="instagram"><i class="fa-brands fa-instagram"></i></div>
                    <div class="youtube"><i class="fa-brands fa-youtube"></i></div>
                </div>
                <div class="bottom_card_buttons">
                    <button>Subscribe</button>
                    <button>Message</button>
                </div>

                <div class="bottom_card_desc">
                    <div class="like"><i class="fa-solid fa-heart"></i><span>50L</span></div>
                    <div class="line" ></div>
                    <div class="comments"><i class="fa-regular fa-comment"></i>12K</div>
                    <div class="line" ></div>
                    <div class="share"><i class="fa-solid fa-share"></i>5K</div>
                </div>
            </div>

        </div>

    </div>

</body>
<script src="https://kit.fontawesome.com/b6c318c10e.js" crossorigin="anonymous"></script>
</html>
