
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Design</title>
    <link rel="stylesheet" href="style.css">
    

</head>
<body>
    

    <div class="container">
        
        <header>

            <nav>

                <div class="nav_left">
                    <img src="images/logo.png" alt="socially">
                </div>

                <div class="nav_middle">
                    <a href="#">Features</a>
                    <a href="#">How it works</a>
                    <a href="#">Privacy</a>
                </div>

                <div class="middle_right">

                    <a href="#">Login</a>
                    <a class="dapp" >Download App</a>

                </div>

            </nav>

        </header>

        <main>

            <div class="main_text">
                <div><h1 class="animation-dr" >Make <br> New Friends</h1></div>
                <div>
                <p class="animation-dr " >Socially is a new social media platform to make new friends online in the <br> world. Now lets explore all its amazing Features</p>
                </div>
                <div><button class="dapp animation-dr">Join Now</button></div>

            </div>

            <div class="main_image">
                <img src="images/pic.png" class="b_img animation-dr" alt="">
            </div>

        </main>

    </div>

</body>
</html>
