<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Design</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container{
            height: 90vh;
            width: 100%;
              overflow: hidden;
            padding: 20px 10%;
        }

        .nav_left .logo img{
            height: 90px;
        }

        a{
            font-weight: bold;
            font-size: 17px;
            text-decoration: none;
            color: black;
            padding: 10px;
            position: relative;
        }

        nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav_right .menu img{
            height: 30px;
        }

        .nav_links{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }

        .nav_links a::before{
            content: '';
            width: 100%;
            height: 0px;
            background: rgb(239, 243, 8);
            position: absolute;
            z-index: -1;
            left: 0;
            bottom: -5px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            transition: height 0.5s;
        }

        .nav_links a:hover::before{
            height: 85px;

        }

        

        

         

        .main_left{
            position: relative;
            top: 150px;
        }

        .main_left_text p{
            font-weight: 500;
            font-size: 40px;
            margin-bottom: 60px;
        }

        .order{
            padding: 20px 40px;
            background: rgb(239, 243, 8);
            border-radius: 60px;
            font-weight: 500;
        }

        .pic1{
            /* height: 500px; */
            width: 500px;
            position: relative;
            left: 100px;
            bottom: 130px;
        }

        .pic2{
            height: 130px;
            /* width: 130px; */
            position: relative;
            bottom: 170px;
            /* left: 100px; */
            right: 370px;
        }

        .main_left{
            display: flex;
            justify-content: space-between;
        }

         





    </style>

    
</head>
<body>
    

    <div class="container">

        <header>

            <nav>

                <div class="nav_left">
                    <div class="logo"><img src="images/logo.png" alt=""></div>
                </div>

                <div class="nav_middle">
                    <div class="nav_links">
                        <a href="#">Home</a>
                        <a href="#">Recipe</a>
                        <a href="#">Blog</a>
                        <a href="#">Contact</a>
                    </div>
                </div>

                <div class="nav_right">
                    <div class="menu">
                        <img src="images/menu.png" alt="">
                    </div>
                </div>

            </nav>

        </header>

        <main>

            <div class="main_left">

                <div class="main_left_text">
                    <p>All happiness depends on a <br> leisurely breakfast</p>
                    <a href="#" class="order">Order Now</a>
                </div>

                <div class="main_left_image">
                    <img class="pic1" src="images/pic1.png" alt="">
                    <img class="pic2" src="images/pic2.png" alt="">
                </div>

            </div>

        </main>

    </div>

</body>
</html>
