    <style>

        .items_container{

            line-height: 1;
            color: #282c3f;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item_name{
            color: #535766;
            font-size: 14px;
            line-height: 1;

        }

        .price{

            line-height: 15px;
            color: #282c3f;
            white-space: nowrap;
            margin-top: 10px;
        }

        .current_price{
            font-size: 14px;
            font-weight: 700;
            color: #282c3f;
        }

        .original_price{
            text-decoration: line-through;
            color: #7e818c;
            font-weight: 400;
            margin-left: 5px;
            font-size: 12px;
        }

        .discount{
            color: #ff905a;
            font-weight: 400;
            font-size: 12px;
            margin-left: 5px;
        }

        .addToBagBtn{

            font-size: 18px;
            width: 100%;
            background-color: lightgreen;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
