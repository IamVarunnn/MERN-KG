<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>

       

        .container{
            height: 90vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .calculator{
            height: 400px;
            width: 300px;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 10px;
            
             
        }

        .input{
            width: 100%;
            height: 15%;
            display: flex;
            justify-content: center;
            align-items: center;
           
        }

        input{
            width: 240px;
            padding: 10px;

        }

        .key{
           height: 80%;
           width: 230px;
            border: 1px solid black;
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            

         
        }

        .keys{
            height: 40px;
            width: 40px;
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
 

    </style>

</head>
<body>
    

    <div class="container">

        <div class="calculator">

            <div class="input">
                <input type="text">
            </div>
            <div class="key">
                <button class="keys keyss one" 
                    onclick="
                    content = content + '1';
                    inputField.value = content;
                    ">1</button>
                <button class="keys keyss two" onclick="
                    content = content + '2';
                    inputField.value = content;
                    ">2</button>
                <button class="keys keyss three" onclick="
                    content = content + '3';
                    inputField.value = content;
                    ">3</button>
                <button class="keys keyss four" onclick="
                    content = content + '4';
                    inputField.value = content;
                    ">4</button>
                <button class="keys keyss five" onclick="
                    content = content + '5';
                    inputField.value = content;
                    ">5</button>
                <button class="keys keyss six" onclick="
                    content = content + '6';
                    inputField.value = content;
                    ">6</button>
                <button class="keys keyss seven" onclick="
                    content = content + '7';
                    inputField.value = content;
                    ">7</button>
                <button class="keys keyss eight" onclick="
                    content = content + '8';
                    inputField.value = content;
                    ">8</button>
                <button class="keys keyss nine" onclick="
                    content = content + '9';
                    inputField.value = content;
                    ">9</button>
                <button class="keys keyss zero" onclick="
                    content = content + '0';
                    inputField.value = content;
                    ">0</button>
                <button class="keys clear" onclick="content =  '';
                inputField.value = content " >C</button>
                <button class="keys keyss add" onclick="
                    content = content + '+';
                    inputField.value = content;
                    ">+</button>
                <button class="keys keyss sub" onclick="
                    content = content + '-';
                    inputField.value = content;
                    ">-</button>
                <button class="keys keyss mul" onclick="
                    content = content + '*';
                    inputField.value = content;
                    ">*</button>
                <button class="keys keyss divs" onclick="
                    content = content + '/';
                    inputField.value = content;
                    ">/</button>
                <button class="keys equal" onclick="
                    content = eval(content);
                    inputField.value = content;
                    ">=</button>
                <button class="keys keyss dot" onclick="
                    content = content + '.';
                    inputField.value = content;
                    ">.</button>
            </div>

        </div>

    </div>

</body>
<script>
    let content = "";
    let inputField = document.querySelector("input");
    inputField.value = content;

    
</script>
</html>
