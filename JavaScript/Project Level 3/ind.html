<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
        }

        h1{
            text-align: center;
            /* align-self: center; */
        }

        .container{
            display: grid;
            grid-template-columns: 200px 150px 100px;
            gap: 20px;
            margin-top: 20px;
        }

        span{
            margin-left: 10px;
        }

        input,button{
            padding: 10px;
        }

        .btn{
            font-weight: bold;
            border: none;
            color: white;
        }

        .add_btn{
            background-color: green;
        }

        .del_btn{
            background-color: red;
        }

    </style>
</head>
<body>
    

    <h1>ToDo App</h1>
    <div class="todo_container container">
        <input class="todo_input" type="text" placeholder="Enter your todo">
        <input class="todo_date" type="date">
        <button class="btn add_btn" onclick="addTodo();" >Add</button>

    </div>

    <!-- <p class="todo_para" ></p> -->
    <div class="grid_todo_container container"></div>
</body>

<script>

    let todoList = [
                    {
                        task : "Get Milk",
                        date : "12 / 12 / 2024"
                    }
                ];
    displayOnPage();

    function addTodo(){
        let todoInputField = document.querySelector(".todo_input");
        // console.log(todoValue.value);
        let todoInputValue = todoInputField.value;
        let todoDateField = document.querySelector(".todo_date");
        let todoDateValue = todoDateField.value;
        // todoList.push(todoValue);
        // todoList.push(todoInputValue);
        // console.log(todoList);
        

        if(todoDateValue == '' || todoInputField == ''){
            alert(`Please enter properly`);
            return;
        }
        todoList.push({task : todoInputValue, date : todoDateValue});

        todoInputField.value = '';
        displayOnPage();
    }

    function displayOnPage(){
        let todo_container = document.querySelector(".grid_todo_container");

        
        let newHtml = '';

        for(let i = 0; i < todoList.length; i++){
            let {task , date} = todoList[i];
            newHtml += `
                <span>${task}</span>
                <span>${date}</span>
                <button class = "btn del_btn" onclick = "todoList.splice(${i},1); displayOnPage();" >Delete</button>
            `
        }

        todo_container.innerHTML = newHtml;
    }

</script>

</html>
