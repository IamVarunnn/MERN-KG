<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo App</title>
    <style>
      body {
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: orange;
      }

      h1 {
        text-align: center;
      }

      .todo_container {
        display: grid;
        grid-template-columns: 200px 150px 100px;
        gap: 30px;
        /* row-gap: 20px; */
        margin-top: 20px;
      }

      input {
        padding: 10px;
        outline: none;
        border: none;
        border-radius: 10px;
      }

      span {
        margin-top: 10px;
        margin-left: 8px;
      }

      button {
        padding: 10px;
        border: none;
        font-weight: bold;
        color: white;
        cursor: pointer;
      }

      .todo_btn_add {
        background-color: green;
      }

      .todo_btn_del {
        background: rgb(243, 61, 61);
      }
    </style>
  </head>
  <body>
    <h1>Todo App</h1>

    <div class="todo_container">
      <input class="todo_input" type="text" placeholder="Enter your Todo" />
      <input class="todo_date" type="date" />
      <button
        class="todo_btn_add"
        onclick="
          addTodo();
          displayItems();
        "
      >
        Add
      </button>
    </div>

    <div class="items_container todo_container"></div>
  </body>
  <script>

    // let todoList = [{task : "Get Milk",date : "2222-11-03"}];
    let todoList = JSON.parse(localStorage.getItem('todoList')) || [];
    displayItems();

    function addTodo(){
        let todo_input = document.querySelector(".todo_input");
        let todo_date = document.querySelector(".todo_date");

        // console.log(todo_input.value);

        // todoList.push(todo_input.value);

        if(todo_input.value == "" || todo_date.value == ""){
            alert('Enter missing fields');
            return;
        }

        console.log({task : todo_input.value, date : todo_date.value});
        todoList.push({task : todo_input.value, date : todo_date.value});

        todo_input.value = '';

        let todoListJs = JSON.stringify(todoList);
        localStorage.setItem('todoList',todoListJs);

        displayItems();
    }

    function displayItems(){
        let n = todoList.length;
        let todos = document.querySelector(".items_container");



        let newHtml = '';

        for(let i = 0; i < n; i++){
            // let {task , date} = todoList[i];
            let {task , date} = todoList[i];
            newHtml += `
                <span>${task}</span>
                <span>${date}</span>
                <button class = "todo_btn_del" onclick = "del();" >Delete</button>
            `
        }

        todos.innerHTML = newHtml;
    }

    function del(i){
        todoList.splice(i, 1);
        localStorage.setItem('todoList',JSON.stringify(todoList));
        displayItems();
    }
  </script>
</html>
