<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <style>

        *{
            /* margin: 0;
            padding: 0; */
            font-family: Arial, Helvetica, sans-serif;
        }

        .main_heading{
            text-align: center;
        }

        body{
            background-color: orange;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .grid_container{
            display: grid;
            grid-template-columns: 200px 150px 100px;
            /* column-gap: ; */
            gap: 20px;
            margin-top: 10px;
            align-items: center;
        }

        input{
            font-size: 15px;
            padding: 10px 5px;
        }

        .btnDel{
            background-color: rgb(184, 50, 50);
            border: none;
            color: white;
            padding: 15px 10px;
            cursor: pointer;

        }

        .btn_add{
            background-color: rgb(0, 255, 106);
            border: none;
            color: white;
            padding: 15px 10px;
            cursor: pointer;
        }

    </style>

</head>
<body>

     <h1 class="main_heading">ToDo App</h1>
    
    <div class="grid_container">
        <input class="input_todo" type="text" placeholder="Enter Todo Here">
        <input class="todo_date" type="date">
        <button class="btn_add" onclick="addTodo()";>Add</button>
        <!-- <p class="todo_items"></p> -->
    </div>

    <div class="todo_container grid_container"></div>


</body>

<script>

    let todoList = [
        
        {
            item:'BuY Mik',
            dueDate : '4/10/2026'
        }

    ];
    displayItems();

    function addTodo(){
        let inputBox = document.querySelector(".input_todo");
        let inputBoxValue = inputBox.value;
        let inputDate = document.querySelector(".todo_date");
        let inputDateValue = inputDate.value;

        todoList.push({item : inputBoxValue, dueDate : inputDateValue});
        

        inputBoxValue.value = '';
        inputDateValue.value = '';
        displayItems();
    }

    function displayItems(){
        let containerEle = document.querySelector(".todo_container");

        let newHtml = '';

        
        for(let i = 0; i < todoList.length; i++){
            // let todoItem = todoList[i].item;
            // let todoDate = todoList[i].dueDate;
            let {item , dueDate} = todoList[i];
            newHtml += `
            <span>${item}</span> <span>${dueDate}</span> <button class = "btnDel" onclick = "todoList.splice(${i},1); displayItems();" >Delete</button> 
            `;
        }
        containerEle.innerHTML = newHtml;
    }

</script>

</html>
