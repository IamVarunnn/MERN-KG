<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
        
        }

        h1{
            text-align: center;
        }

        .grid-container{
            display: grid;
            grid-template-columns: 200px 150px 100px;
            gap: 20px;
            margin: 10px;
        }

        input,button{
            padding: 10px;
              
        }

        

        .todo_btn{
            background-color: green;
            border: none;
            color: white;
            font-weight: bold;
            width: 100%;

        }

        .del_btn{
            background-color: rgb(197, 26, 26);
            border: none;
            color: white;
            font-weight: bold;
        }

        span{
            margin-top: 10px;
            margin-left: 5px;
        }

        



    </style>
</head>
<body>
    
    <h1>Todo App</h1>

   <div class="grid-container">
        <input class="todo_input" type="text" placeholder="Enter your TODO">
        <input class="todo_date" type="date">
        <button class="todo_btn" onclick="addTodo();" >Add</button>
   </div>
    <!-- <p class="todo_para"></p> -->
    <div class="todo_container grid-container"></div>

</body>

<script>

    let todoList = [
        {
            item : "Get Milk",
            date : "12/12/2020"
        }
    ];
    showOnPage();

    function addTodo(){
        let arr = [];
        let todoInput = document.querySelector(".todo_input");
        let todoDate = document.querySelector(".todo_date");
        // console.log(todoInput.value);

        // todoList.push(todoInput.value);

        // let [item, date] = todoList;

        if(todoInput.value === '' || todoDate.value === ''){
            alert("Please enter todo and date");
            return;
        }

        todoList.push({item : todoInput.value, date : todoDate.value});

        console.log(todoList);

        todoInput.value = '';

        showOnPage();

    }

    function showOnPage(){
        let containerEle = document.querySelector(".todo_container");

        let newHtml = ``
       
        for(let i = 0; i < todoList.length; i++){
            // let {Sitem, Sdate} = todoList[i];
            // let Titem = todoList[i].item;
            // let Tdate = todoList[i].date;

            let {item, date} = todoList[i];
            newHtml += `
                <span>${item}</span> <span>${date}</span>
                <button class = "del_btn" onclick = "todoList.splice(${i},1); showOnPage();" >Delete</button>
            `;
        }

        containerEle.innerHTML = newHtml;
    }

     

</script>

</html>
