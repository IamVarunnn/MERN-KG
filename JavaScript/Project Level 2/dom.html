<script>

    let score = {

        tie : 0,

        randNoGen(){
       
            let randNo = Math.round(Math.random() * 2) + 1;
            if(randNo == 1){
                return 'Bat';
            }
            else if(randNo == 2){

            }

            }

        showRes(userChoice, computerChoice, res){

            `)
        },

        getResult(userChoice, computerChoice){
            if(userChoice == 'Bat'){
                if(computerChoice == 'Ball'){
                    score.userWon++;
                    return 'User Won';
                }
                else if(computerChoice == 'Wicket'){
                    score.userLost++;
                    return 'Computer Won';
                }
                else{
                    score.tie++;
                    return 'Tie';
                }
            }
            else if(userChoice == 'Ball'){
                if(computerChoice == 'Bat'){
                    score.userLost++;
                    return 'Computer Won';
                }
                else if(computerChoice == 'Wicket'){
                    score.userWon += 1;
                    return 'User Won';
                }
                else{
                    score.tie++;
                    return 'Tie';
                }
            }
            else if(userChoice == 'Wicket'){
                if(computerChoice == 'Bat'){
                    score.userWon++;
                    return 'User Won';
                }
                else if(computerChoice == 'Ball'){
                    score.userLost++;
                    return 'Computer Won';
                }
                else{
                    score.tie++;
                    return 'Tie';
                }
            }
        },
