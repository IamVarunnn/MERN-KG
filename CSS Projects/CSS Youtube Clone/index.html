<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        *{
            margin: 0;
            padding: 0;
            /* background-color: black; */
            font-family: "Roboto", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
            
        }

       

        
        a{
            text-decoration: none;
        }

        .yt_logo{
            display: flex;
            align-items: center;
            
        }

        .yt_logo .yt_image{
            height: 25px;
            display: flex;
        }

        .yt_text{
            padding-left: 2px;
            font-size: 18px;
            font-weight: 800;
            transform: scaleY(1.3);
        }

        .yt_text .region{
            font-size: 10px;
            color: grey;
        }

        .profile_img{
            border-radius: 50%;
            height: 30px;
        }



        nav{
            /* border: 1px solid black; */
            display: flex;
            justify-content: space-between;
            margin-top: 7.5px;
            margin-bottom: 20px;
           
        }

        .nav_left .menu span{
            font-size: 18px;
        }

        .nav_left{
            display: flex;
            align-items: center;
            padding-left: 20px;
            
        }

        .nav_left .yt_logo{
            padding-left: 20px;
            padding-bottom: 5px;

        }

        .nav_middle{
            display: flex;
            align-items: center;
            width: 40%;
            
        }

        .search_bar{
            display: flex;
            align-items: center;
            
            width: 100%;
            border: 1px solid black;
            height: 35px;
            border-radius: 20px;
            
        }

        .search_bar input{
            padding-left: 20px;
            height: 34px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            flex-grow: 1;
            border: none;
            outline: none;
        }

        

        .search_bar .search_icon {
            background-color: grey;
            display: flex;
            /* min-width: 200px; */
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .nav_middle .microphone span {
            margin-left: 10px;
            font-size: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 50%;
            cursor: pointer;
            background: rgb(215, 209, 209);
            color: white;
             
        }

        .nav_middle .microphone span:hover {
            background-color: grey;
        }

        .nav_right{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-right: 20px;
        }

       

        .create_button button{
            height: 33px;
            width: 100px;
            border-radius: 30px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: rgb(215, 209, 209);
            
        }

        .create_button .plus{
            padding-right: 5px;
            font-size: 30px;
        }

        .create_button:hover{
            border-radius: 30px;
            background-color: rgb(5, 5, 5);
            
        }

        .left_side {
            display: flex;
            flex-direction: column;
            margin-top: -40px;
            /* margin-left:1px; */
            gap: 20px;
        }

        .left_side .home{
            display: flex;
            flex-direction: column;
            /* border: 1px solid black; */
            justify-content: center;
            width: 60px;
            /* height: 0px; */
             
           
        }

        .left_side .home span{
            text-align: center;
        }

        .allbuttons{
            display: flex;
            gap: 10px;
            margin-left: 80px;
        }

        

        .allbuttons button {
            font-size: 15px;
            height: auto;
            border-radius: 5px;
            padding: 5px 10px;
            width: auto;
            border: none;
            white-space: nowrap;
        }

        

        .main_content{
            display: flex;
            flex-wrap: wrap;
            margin-left: 100px;
            margin-top: -150px;
        }

        .thumbnails{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 50px;
        }

         

        .thumbnails img{
           width: 100%;
            max-width: 420px;
            height: auto;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .thumbnails img:hover{
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,3);
        }

        @media (max-width : 600px) {
             
        }


        



         

    </style>

</head>
<body>
    
    <header>

        <nav>

            <div class="nav_left">
                <div class="menu"><span class="material-symbols-outlined">density_medium</span></div>
                <div class="yt_logo">
                    <a href="#"><img src="image.png" class="yt_image" alt=""></a>
                    <span class="yt_text" >YouTube <sup class="region" >IN</sup> </span>
                </div>
            </div>


            <div class="nav_middle">

                <div class="search_bar">
                    <input type="text" placeholder="Search">
                    <span class="material-symbols-outlined search_icon">search</span>
                </div>

                <div class="microphone">
                    <span class="material-symbols-outlined">mic</span>
                </div>

            </div>

            <div class="nav_right">
                <div class="create_button"><button><span class="plus" >+</span><span>Create</span></button></div>
                <div class="notifications"><span class="material-symbols-outlined">notifications</span></div>
                <div class="profile"><img src="https://yt3.ggpht.com/3NLQ4g4DH69uSX6_12HBN89mJUf1X6TiGmQJsI7BdiumzmNK-b_UyEH6kVRNMLYKppAYf_xt=s88-c-k-c0x00ffffff-no-rj" class="profile_img" alt=""></div>
            </div>

        </nav>

        <div class="allbuttons">

            <button>All</button>
            <button>Gaming</button>
            <button>Accents</button>
            <button>Podcasts</button>
            <button>Music</button>
            <button>Live</button>
            <button>Mixes</button>
            <button>Game for Peace</button>
            <button>Fast Food</button>
            <button>Web Development</button>
            <button>Andriod</button>
            <button>Restaurents</button>
            <button>Food</button>
            <button>Jobs</button>
            <button>Communication</button>
            <button>Data Structure and Algorithms</button>
            <button>Block Chain</button>
            <button>Colors</button>
            <button>Hotels</button>

        </div>

    </header>

    <main>

        <aside>

            <div class="left_side">
                <div class="home">
                    <span class="material-symbols-outlined">home</span>
                    <span>Home</span>
                </div>
                <div class="home">
                    <span class="material-symbols-outlined">animated_images</span>
                    <span>Shorts</span>
                </div>
                <div class="home">
                    <span class="material-symbols-outlined">subscriptions</span>
                    <span>Subs</span>
                </div>
                <div class="home">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span>You</span>
                </div>   
            </div>

             

        </aside>

        <div class="main_content">

            <div class="thumbnails">
                <div class="first image"><img src="images/Screenshot 2026-02-05 113913.png" alt=""></div>
                <div class="second image"><img src="images/Screenshot 2026-02-05 114542.png" alt=""></div>
                <div class="third image"><img src="images/Screenshot 2026-02-05 114551.png" alt=""></div>
                <div class="fourth image"><img src="images/Screenshot 2026-02-05 114602.png" alt=""></div>
                <div class="first image"><img src="images/Screenshot 2026-02-05 113913.png" alt=""></div>
                <div class="second image"><img src="images/Screenshot 2026-02-05 114542.png" alt=""></div>
            </div>

        </div>

       

    </main>

</body>
</html>
