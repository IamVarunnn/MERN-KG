<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>

        button{
            height: 30px;
            width: 80px;
            background-color: beige;
            border-radius: 10px;
            cursor: pointer;;

            
        }

        button:hover{
            height: 40px;
            width: 90px;
             
          
            border: 5px solid yellow;
        }

        button:active{
            color: wheat;
            background-color: green;
        }

        .box{
            height: 50px;
            width: 50px;
            background-color: green;
            /* border-radius: 10px; */
            margin: 40px;
            /* transition-property: height width;
            transition-duration: 1s;
            transition-timing-function: ease-in-out; */
            /* transition-delay: 1s; */
            transition: height 1s steps(5) 1s;
        }

        .box:hover{
            background-color: yellow;
            color: green;
            height: 100px;
            /* width: 100px; */
        }



    </style>
</head>
<body>
    
    <button>Click me</button>

    <div class="box">
        Hello
    </div>

</body>
</html>
