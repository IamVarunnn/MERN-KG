<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>

        button{
            height: 30px;
            width: 80px;
            background-color: beige;
            border-radius: 10px;
        }

        button:hover{
            height: 40px;
            width: 90px;
             
          
            border: 5px solid yellow;
        }

        button:active{
            color: wheat;
            background-color: green;
        }

    </style>
</head>
<body>
    
    <button>Click me</button>

</body>
</html>
