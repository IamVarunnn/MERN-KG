<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra Logo</title>
    <link rel="stylesheet" href="styleMyn.css">
    <style>

        .box{
            background-color: red;
            height: 100px;
            width: 100px;
             visibility: hidden;
            
        }

         
        .logo{
            background-color: green;
            height: 50px;
            width: 50px;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJVxlZO-GHUUKA6anNj0yKKSUQGxEa2lvYBA&s);
            background-size: 25px;
            background-repeat: no-repeat;
            background-position: top left;
            visibility: visible;
           
        }

        
    </style>
</head>
<body>
    
    <div class="box">
        <div class="logo"></div>
    </div>

</body>
</html>
