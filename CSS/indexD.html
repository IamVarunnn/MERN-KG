<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positions</title>


    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .box{
            height: 150px;
            width: 150px;
            background-color: green;
            margin: 5px;
        }

        .box1{
            visibility: hidden;
        }

        .box2{
            position: relative;
            top: 30px;
            left: 50px;
        }

        .box3{
            position: absolute;
            top: 20px;
            left: 40px;
        }

        .box5{
            position: fixed;
            right: 100px;
        }

        .box4{
            position: relative;
            border: 10px solid black;
            z-index: 1;
        }

    </style>

</head>
<body>
    
    <div class="box box1">Box1</div>
    <div class="box box2">Box2 </div>
    <div class="box box3">Box3</div>
    <div class="box box5">Box4</div>
    <div class="box box4">Box4</div>
    <div class="box box4">Box4</div>
    <div class="box box4">Box4</div>
    <div class="box box4">Box4</div>
    <div class="box box4">Box4</div>
    <div class="box box4">Box4</div>
    <div class="box box4">Box4</div>
    <div class="box box4">Box4</div>


</body>
</html>
