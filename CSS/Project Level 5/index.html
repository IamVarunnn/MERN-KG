<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 5</title>

    <style>

        *{
            margin: 0;
            padding: 0;
        }

        nav{
            height: 20px;
            background-color: red;
        }

        nav > a{
            padding: 15px;
            margin-left: 100px;
            text-decoration: none;
        }

        .border{
            border: 10px solid black;
        }

        .box{
            height: 100px;
            width: 100px;
            margin-left: 100px;
            margin-top: 50px;
            margin-bottom: 50px;
            background-color: blue;
            border-radius: 50%;
        }

        .box2{
            height: 100px;
            width: 100px;
            background-color: orangered;
            display: inline-block;
            margin: 50px;
        }

        .box3{
            height: 100px;
            width: 100px;
            margin-top: 20px;
            background-color: yellow;
            position: fixed;
            right: 100px;
        }

        .parent{
            position: relative;
            margin: 10px;
            border: 5px solid black;
        }

        .box4{
            height: 100px;
            width: 100px;
            background-color: green;
            /* margin: 10px; */
            border: 10px solid black;
            position: relative;
            top: 20px;
            left: 20px;
            z-index: 1;
            
        }

       

        .box5{
            height: 100px;
            width: 100px;
            background-color: green;
            /* margin: 10px; */
            border: 10px solid black;
            position: absolute
            ;
            top: 0px;
            left: 30px;
            z-index: 0;
            
        }

        footer{
            background-color: green;
        }



    </style>

</head>
<body>
    
    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact Me</a>
            <a href="#">Profile</a>
        </nav>
    </header>


    <main>

        <div class="box"></div>

        <div class="border">
            <div class="box2">One</div>
            <div class="box2">Two</div>
            <div class="box2">Three</div>
        </div>

        <div class="box3"></div>

        <div class="parent">
            <div class="box4"></div>
            <div class="box4"></div>
            <div class="box4"></div>
            <div class="box5"></div>
            <div class="box5"></div>
            <div class="box5"></div>
        </div>

    </main>

    <hr>

    <footer>
        <p>@Lorem ipsum dolor sit amet.</p>
    </footer>

</body>
</html>
