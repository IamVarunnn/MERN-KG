<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />


    <style>

        *{
            margin: 0;
            padding: 0;
            /* background-color: black; */
            
        }

        a{
            text-decoration: none;
        }

        .yt_logo{
            display: flex;
            align-items: center;
            
        }

        .yt_logo .yt_image{
            height: 25px;
            display: flex;
        }

        .yt_text{
            font-size: 18px;
            font-weight: 400;
        }

        .profile_img{
            border-radius: 50%;
            height: 30px;
        }



        nav{
            /* border: 1px solid black; */
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
           
        }

        .nav_left .menu span{
            font-size: 18px;
        }

        .nav_left{
            display: flex;
            align-items: center;
            padding-left: 20px;
            
        }

        .nav_left .yt_logo{
            padding-left: 25px;
            padding-bottom: 5px;

        }

        .nav_middle{
            display: flex;
            align-items: center;
            width: 40%;
            margin-left: -70px;
        }

        .search_bar{
            display: flex;
            align-items: center;
            width: 100%;
            border: 1px solid black;
            height: 35px;
            border-radius: 20px;
            
        }

        .search_bar input{
            padding-left: 20px;
            height: 34px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            flex-grow: 1;
            border: none;
            outline: none;
        }

        

        .search_bar .search_icon {
            background-color: grey;
            display: flex;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .nav_middle .microphone span {
            margin-left: 10px;
            font-size: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 50%;
            cursor: pointer;
            background: rgb(215, 209, 209);
            color: white;
             
        }

        .nav_middle .microphone span:hover {
            background-color: grey;
        }

        .nav_right{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-right: 20px;
        }

        .create_button{}

        .create_button button{
            height: 33px;
            width: 100px;
            border-radius: 30px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: rgb(215, 209, 209);
            
        }

        .create_button .plus{
            padding-right: 5px;
            font-size: 30px;
        }

        .create_button:hover{
            border-radius: 30px;
            background-color: rgb(5, 5, 5);
            
        }
        


         

    </style>

</head>
<body>
    
    <header>

        <nav>

            <div class="nav_left">
                <div class="menu"><span class="material-symbols-outlined">density_medium</span></div>
                <div class="yt_logo">
                    <a href="#"><img src="image.png" class="yt_image" alt=""></a>
                    <span class="yt_text" >YouTube <sup>IN</sup> </span>
                </div>
            </div>


            <div class="nav_middle">

                <div class="search_bar">
                    <input type="text" placeholder="Search">
                    <span class="material-symbols-outlined search_icon">search</span>
                </div>

                <div class="microphone">
                    <span class="material-symbols-outlined">mic</span>
                </div>

            </div>

            <div class="nav_right">
                <div class="create_button"><button><span class="plus" >+</span><span>Create</span></button></div>
                <div class="notifications"><span class="material-symbols-outlined">notifications</span></div>
                <div class="profile"><img src="https://yt3.ggpht.com/3NLQ4g4DH69uSX6_12HBN89mJUf1X6TiGmQJsI7BdiumzmNK-b_UyEH6kVRNMLYKppAYf_xt=s88-c-k-c0x00ffffff-no-rj" class="profile_img" alt=""></div>
            </div>

        </nav>

    </header>

</body>
</html>
