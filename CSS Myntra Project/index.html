<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra Clone</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
    <style>

        *{
            margin: 0;
            padding: 0;
        }
        

        .logo{
            margin-left: 20px;
        }
        .logo > img{
            height: 45px;
             
        }

       
        nav{
            height: 80px;
            width: 100vw;
            border: 1px solid black;
            background-color: beige;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navlinks{
            min-width: 500px;
            display: flex;
            justify-content: space-between;  
        }

        .navlinks > a{
            font-weight: 700;
            /* letter-spacing: 5; */
            text-decoration: none;
            color: black;
        }

        .navlinks > a > sup{
            color: rgb(208, 57, 82);
        }

        .searchbar{
            border: 1px solid grey;
            min-width: 400px;
            height: 30px;
            display: flex;
            align-items: center;
            
        }

        .searchbar > span{
            margin-top: 1px;
            margin-right: 5px;
        }

        .searchbar > input{
            height: 100%;
            width: 90%;
            flex-grow: 1;
            border: none;
            

        }

        .quicklinks{
            display: flex;
            min-width: 200px;
            justify-content: space-between;
            margin-right: 63px;
        }

        .quicklinks > a{
            text-decoration: none;
        }



        
 
    </style>

</head>
<body>
    
    <header>

        <nav>

            <div class="logo">
                <img src="images/myntra_logo.webp" alt="">
            </div>

            <div class="navlinks">
                <a href="#">MEN</a>
                <a href="#">WOMEN</a>
                <a href="#">KIDS</a>
                <a href="#">HOME</a>
                <a href="#">BEAUTY</a>
                <a href="#">GENZ</a>
                <a href="#" class="studio">STUDIO <sup>NEW</sup> </a>
            </div>

            <div class="searchbar">
                <span class="material-symbols-outlined">search</span><input type="text">
            </div>

            <div class="quicklinks">
                <div class="profile"><a href="#"><span></span>Profile</a></div>
                <div class="wishlist"><a href="#">Wishlist</a></div>
                <div class="bag"><a href="#">Bag</a></div>
            </div>

        </nav>

    </header>


    <main></main>


    <footer></footer>

</body>
</html>
